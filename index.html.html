        function draw(arr) { var c = document.getElementById('products'); var h = ''; for(var i=0; i<arr.length; i++) { var p = arr[i]; var discountBadge = ''; var priceHtml = '<span class="current-price">'+p.price+translations[currentLang].currency+'</span>'; if(p.old_price && p.old_price > p.price) { var disc = Math.round(((p.old_price - p.price) / p.old_price) * 100); discountBadge = '<div class="discount-badge">-'+disc+'%</div>'; priceHtml += '<span class="old-price">'+p.old_price+translations[currentLang].currency+'</span>'; } h += '<div class="product-card" onclick="openProductPage('+p.id+')"><div class="product-img-wrap"><img src="'+p.img+'">'+discountBadge+'</div><div class="product-details"><div class="product-name">'+p.name+'</div><div class="price-box">'+priceHtml+'</div></div></div>'; } c.innerHTML = h; setTimeout(function() { var cards = document.querySelectorAll('.product-card'); cards.forEach(function(card, index) { setTimeout(function() { card.classList.add('animate'); }, index * 150); }); }, 100); }
        function search() { var q = document.getElementById('searchInput').value.toLowerCase(); var f = []; for(var i=0; i<db.length; i++) { if(db[i].name.toLowerCase().includes(q)) f.push(db[i]); } draw(f); }
        function showShop() { document.getElementById('shop-view').style.display = 'block'; document.getElementById('product-page').style.display = 'none'; document.getElementById('searchBoxMain').style.display = 'block'; window.scrollTo(0, 0); draw(db); }
        function openContact() { document.getElementById('contact-modal').classList.add('show'); }
        function closeContact() { document.getElementById('contact-modal').classList.remove('show'); }

        function openProductPage(id) { for(var i=0; i<db.length; i++) { if(db[i].id == id) { currentProd = db[i]; break; } } if (typeof currentProd.colors === 'string') { currentProd.colors = currentProd.colors.split(',').map(function(c){ return c.trim(); }).filter(function(c){ return c.length > 0; }); } if(!currentProd.colors || currentProd.colors.length == 0) { currentProd.colors = ["#000000"]; } if (typeof currentProd.sizes === 'string') { currentProd.sizes = currentProd.sizes.split(',').map(function(s){ return s.trim(); }).filter(function(s){ return s.length > 0; }); } if(!currentProd.sizes || currentProd.sizes.length == 0) { currentProd.sizes = ["M", "L"]; } selColor = fixColor(currentProd.colors[0]); selSize = currentProd.sizes[0]; document.getElementById('pp-img').src = currentProd.img; document.getElementById('pp-name').innerText = currentProd.name; document.getElementById('pp-price').innerText = currentProd.price + translations[currentLang].currency; var oldP = document.getElementById('pp-old-price'); if(currentProd.old_price && currentProd.old_price > currentProd.price) { oldP.innerText = currentProd.old_price + translations[currentLang].currency; oldP.style.display = 'inline'; } else { oldP.style.display = 'none'; } var colHtml = ''; for(var i=0; i<currentProd.colors.length; i++) { var c = fixColor(currentProd.colors[i]); var act = c === selColor ? 'active' : ''; colHtml += '<button class="c-btn '+act+'" style="background-color:'+c+'" onclick="pickColor(\''+c+'\', this)"></button>'; } document.getElementById('pp-colors').innerHTML = colHtml; var sizeHtml = ''; for(var i=0; i<currentProd.sizes.length; i++) { var act = currentProd.sizes[i] === selSize ? 'active' : ''; sizeHtml += '<button class="s-btn '+act+'" onclick="pickSize(\''+currentProd.sizes[i]+'\', this)">'+currentProd.sizes[i]+'</button>'; } document.getElementById('pp-sizes').innerHTML = sizeHtml; var recs = []; for(var i=0; i<db.length; i++) { if(db[i].id !== id) { recs.push(db[i]); } } var recHtml = ''; for(var i=0; i<recs.length; i++) { recHtml += '<div class="rec-card" onclick="openProductPage('+recs[i].id+')"><img src="'+recs[i].img+'"><div class="rec-name">'+recs[i].name+'</div><div class="rec-price">'+recs[i].price+translations[currentLang].currency+'</div></div>'; } document.getElementById('rec-grid').innerHTML = recHtml; document.getElementById('shop-view').style.display = 'none'; document.getElementById('searchBoxMain').style.display = 'none'; document.getElementById('product-page').style.display = 'block'; window.scrollTo(0, 0); }
        function toggleChart() { var chart = document.getElementById('sizeChart'); chart.style.display = chart.style.display === 'block' ? 'none' : 'block'; }
        function pickColor(c, el) { selColor = c; var btns = document.getElementsByClassName('c-btn'); for(var i=0; i<btns.length; i++) btns[i].classList.remove('active'); el.classList.add('active'); }
        function pickSize(s, el) { selSize = s; var btns = document.getElementsByClassName('s-btn'); for(var i=0; i<btns.length; i++) btns[i].classList.remove('active'); el.classList.add('active'); }

        function addToCartPage() { var exists = false; for(var i=0; i<cart.length; i++) { if(cart[i].id === currentProd.id && cart[i].size === selSize && cart[i].color === selColor) { cart[i].qty += 1; exists = true; break; } } if(!exists) { cart.push({ id: currentProd.id, name: currentProd.name, price: currentProd.price, img: currentProd.img, size: selSize, color: selColor, qty: 1 }); } updateCart(); var msg = document.getElementById('success-msg'); msg.style.display = 'block'; setTimeout(function(){ msg.style.display = 'none'; }, 2000); }
        function buyNowPage() { addToCartPage(); setTimeout(function(){ openCart(); }, 500); }
        function changeQty(index, diff) { cart[index].qty += diff; if(cart[index].qty <= 0) { cart.splice(index, 1); } updateCart(); }
        function updateCart() { var t = translations[currentLang]; var count = 0, total = 0, h = ''; for(var i=0; i<cart.length; i++) { count += cart[i].qty; total += (cart[i].price * cart[i].qty); h += '<div class="cart-item"><img src="'+cart[i].img+'"><div class="cart-item-details"><h4>'+cart[i].name+'</h4><div class="cart-item-meta">'+t.size+': '+cart[i].size+' | <span style="width:15px;height:15px;border-radius:50%;background:'+cart[i].color+';display:inline-block;border:1px solid #ccc;"></span></div><div class="qty-controls"><button class="qty-btn" onclick="changeQty('+i+', -1)">-</button><span class="qty-val">'+cart[i].qty+'</span><button class="qty-btn" onclick="changeQty('+i+', 1)">+</button></div></div><button class="remove-btn" onclick="changeQty('+i+', 0)">حذف</button></div>'; } if(cart.length == 0) { h = '<div style="text-align:center;color:#aaa;margin-top:50px;">'+t.emptyCart+'</div>'; } document.getElementById('cart-count').innerText = count; document.getElementById('cart-items').innerHTML = h; document.getElementById('total-price').innerText = total + t.currency; }
        function openCart() { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').style.display = 'block'; }
        function closeCart() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').style.display = 'none'; document.getElementById('checkout-modal').classList.remove('show'); closeContact(); }
        function openCheckout() { if(cart.length == 0) { alert(currentLang == 'en' ? "Cart is empty!" : "السلة فارغة!"); return; } document.getElementById('checkout-modal').classList.add('show'); }

        function submitOrder() {
            var n = document.getElementById('c_name').value, p = document.getElementById('c_phone').value, a = document.getElementById('c_address').value;
            if(n==""||p==""||a=="") { alert(currentLang == 'en' ? "Please fill all data" : "من فضلك أكمل البيانات"); return; }
            var payMethod = document.querySelector('input[name="payMethod"]:checked').value;
            var orders = JSON.parse(localStorage.getItem('site_orders')) || [];
            // هنا حفظت الوقت الحالي مع الطلب
            orders.push({ name: n, phone: p, address: a, cart: cart, total: document.getElementById('total-price').innerText, payMethod: payMethod, timestamp: Date.now() });
            localStorage.setItem('site_orders', JSON.stringify(orders));
            cart = []; updateCart(); closeCart(); 
            document.getElementById('c_name').value=""; document.getElementById('c_phone').value=""; document.getElementById('c_address').value="";
            alert(translations[currentLang].orderSuccess + p);
        }

        applyTranslations();
        document.getElementById('sizeChart').innerHTML = translations[currentLang].chartContent;
        draw(db);
    </script>
</body>
</html>
