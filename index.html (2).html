<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم إِلَافَ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: #F5F1EB; padding: 40px; color: #111; }
        .panel { max-width: 800px; margin: 0 auto 40px; background: #FAF8F5; padding: 40px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.03); border: 1px solid #E8E0D5; }
        h2 { margin-bottom: 25px; font-weight: 800; border-bottom: 2px solid #3E2723; padding-bottom: 10px; color: #3E2723; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 14px; color: #3E2723; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #E8E0D5; border-radius: 8px; font-family: 'Tajawal'; font-size: 14px; outline: none; background: #F5F1EB; }
        .hint { font-size: 12px; color: #888; margin-top: 5px; }
        .btn { background: #3E2723; color: #fff; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-family: 'Tajawal'; font-weight: 700; font-size: 16px; width: 100%; transition: 0.3s; }
        .btn:hover { background: #5D4037; }
        .msg { margin-top: 20px; padding: 15px; background: #EDE8E0; color: #3E2723; border-radius: 8px; display: none; text-align: center; font-weight: 700; }
        .product-list { margin-top: 20px; }
        .p-row { display: flex; align-items: center; gap: 15px; padding: 15px 0; border-bottom: 1px solid #E8E0D5; }
        .p-row img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; }
        .p-info { flex: 1; }
        .p-actions button { padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; font-family: 'Tajawal'; font-weight: 700; margin-left: 5px; }
        .edit-btn { background: #E0C3FC; color: #000; }
        .del-btn { background: #FFCDD2; color: #B71C1C; }

        .order-card { background: #fff; padding: 20px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #E8E0D5; }
        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dashed #ccc; }
        .order-total { font-weight: 800; font-size: 18px; color: #3E2723; }
        .order-pay { background: #3E2723; color: #fff; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
        .order-time { font-size: 12px; color: #888; font-weight: 700; background: #F5F1EB; padding: 3px 8px; border-radius: 10px; }
        .order-items-list { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; }
        .order-item-mini { min-width: 100px; text-align: center; }
        .order-item-mini img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; margin: 0 auto 5px; }
        .order-client-info { font-size: 14px; line-height: 1.6; color: #555; }
        .order-client-info strong { color: #111; }
    </style>
</head>
<body>

    <div class="panel">
        <h2 id="formTitle">إضافة منتج جديد</h2>
        <input type="hidden" id="edit_id" value="">
        <div class="form-group"><label>اسم المنتج</label><input type="text" id="p_name" placeholder="مثال: تيشيرت أسود"></div>
        <div class="form-group"><label>السعر الحالي</label><input type="number" id="p_price" placeholder="السعر بعد الخصم"></div>
        <div class="form-group"><label>السعر القديم (لقفل الخصم اتركه فاضي)</label><input type="number" id="p_old_price" placeholder="السعر الأصلي"></div>
        <div class="form-group"><label>المقاسات (مفصولة بفاصلة)</label><input type="text" id="p_sizes" placeholder="S, M, L, XL"></div>
        <div class="form-group"><label>كود الألوان (ممكنك تكتب اسم اللون عربي)</label><input type="text" id="p_colors" placeholder="مثال: اسود، ابيض، بيج"><div class="hint">تقدر تكتب (اسود، ابيض، بيج، رمادي) أو كود هيكس (مثال: #000000)</div></div>
        <div class="form-group"><label>لينك الصورة</label><input type="text" id="p_img" placeholder="الصق رابط الصورة هنا"></div>
        <button class="btn" id="submitBtn" onclick="saveProduct()">إضافة للموقع</button>
        <div id="success_msg" class="msg">تمت العملية بنجاح!</div>
    </div>

    <div class="panel">
        <h2>المنتجات الحالية</h2>
        <div id="productsList" class="product-list"></div>
    </div>

    <div class="panel">
        <h2>الطلبات الواردة ⬇️</h2>
        <div id="ordersList"></div>
    </div>

    <script>
        function getProducts() { return JSON.parse(localStorage.getItem('site_products')) || []; }
        
        function renderProducts() {
            var db = getProducts();
            var c = document.getElementById('productsList');
            if(db.length == 0) { c.innerHTML = '<p style="text-align:center;color:#888;">لا توجد منتجات.</p>'; return; }
            var h = '';
            for(var i=0; i<db.length; i++) {
                var priceTxt = db[i].price + ' ج.م';
                if(db[i].old_price) priceTxt += ' <span style="text-decoration:line-through;color:#999;font-size:12px;">('+db[i].old_price+')</span>';
                h += '<div class="p-row"><img src="'+db[i].img+'"><div class="p-info"><strong>'+db[i].name+'</strong><br><span style="color:#888;font-size:13px;">'+priceTxt+'</span></div><div class="p-actions"><button class="edit-btn" onclick="editProduct('+db[i].id+')">تعديل</button><button class="del-btn" onclick="deleteProduct('+db[i].id+')">حذف</button></div></div>';
            }
            c.innerHTML = h;
        }

        function saveProduct() {
            var id = document.getElementById('edit_id').value;
            var name = document.getElementById('p_name').value;
            var price = document.getElementById('p_price').value;
            var old_price = document.getElementById('p_old_price').value;
            var sizes = document.getElementById('p_sizes').value.split(',').map(s => s.trim());
            var colors = document.getElementById('p_colors').value.split(',').map(c => fixColor(c.trim())); // استدعاء نفس دالة تحويل الألوان
            var img = document.getElementById('p_img').value;

            if(name == "" || price == "" || img == "") { alert("الاسم والسعر والصورة مطلوبين"); return; }

            var products = getProducts();
            if(id === "") {
                var newId = products.length > 0 ? products[products.length - 1].id + 1 : 1;
                products.push({ id: newId, name: name, price: Number(price), old_price: old_price ? Number(old_price) : null, sizes: sizes, colors: colors, img: img });
            } else {
                for(var i=0; i<products.length; i++) {
                    if(products[i].id == id) {
                        products[i].name = name;
                        products[i].price = Number(price);
                        products[i].old_price = old_price ? Number(old_price) : null;
                        products[i].sizes = sizes;
                        products[i].colors = colors;
                        products[i].img = img;
                        break;
                    }
                }
            }

            localStorage.setItem('site_products', JSON.stringify(products));
            clearForm();
            renderProducts();
            document.getElementById('success_msg').style.display = 'block';
            setTimeout(()=>{ document.getElementById('success_msg').style.display = 'none'; }, 2000);
        }

        // دالة تحويل الألوان (نفس اللي في الموقع عشان لو لقيت لون برضه يظبط)
        function fixColor(c) {
            if(!c) return "#000000";
            var map = { 'اسود': '#000000', 'أسود': '#000000', 'black': '#000000', 'ابيض': '#FFFFFF', 'أبيض': '#FFFFFF', 'white': '#FFFFFF', 'بيج': '#F5F1EB', 'beige': '#F5F1EB', 'رمادي': '#808080', 'grey': '#808080', 'gray': '#808080', 'احمر': '#FF0000', 'أحمر': '#FF0000', 'red': '#FF0000', 'وردي': '#FFC0CB', 'pink': '#FFC0CB', 'بني': '#3E2723', 'brown': '#3E2723', 'سماوي': '#87CEEB', 'blue': '#0000FF', 'أزرق': '#0000FF', 'اخضر': '#008000', 'أخضر': '#008000', 'green': '#008000', 'موف': '#E0B0FF', 'purple': '#800080', 'بنفسجي': '#800080' };
            return map[c.toLowerCase()] || c;
        }

        function editProduct(id) {
            var products = getProducts();
            var p = products.find(x => x.id === id);
            document.getElementById('edit_id').value = p.id;
            document.getElementById('p_name').value = p.name;
            document.getElementById('p_price').value = p.price;
            document.getElementById('p_old_price').value = p.old_price || "";
            document.getElementById('p_sizes').value = p.sizes.join(', ');
            // لما بيجيب اللون للتعديل، يرجعه للشكل اللي دخله به (عربي أو هيكس)
            var colorsBack = [];
            for(var i=0; i<p.colors.length; i++) {
                var c = p.colors[i];
                // إذا اللون هيكس ومش موجود في الخريطة، يرجعه هيكس
                if(c.startsWith('#')) { colorsBack.push(c); } 
                else { colorsBack.push(c); }
            }
            document.getElementById('p_colors').value = colorsBack.join(', ');
            document.getElementById('p_img').value = p.img;
            document.getElementById('formTitle').innerText = "تعديل المنتج";
            document.getElementById('submitBtn').innerText = "حفظ التعديلات";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deleteProduct(id) {
            if(!confirm("هل أنت متأكد من حذف هذا المنتج؟")) return;
            var products = getProducts().filter(p => p.id !== id);
            localStorage.setItem('site_products', JSON.stringify(products));
            renderProducts();
        }

        function clearForm() {
            document.getElementById('edit_id').value = "";
            document.getElementById('p_name').value = "";
            document.getElementById('p_price').value = "";
            document.getElementById('p_old_price').value = "";
            document.getElementById('p_sizes').value = "";
            document.getElementById('p_colors').value = "";
            document.getElementById('p_img').value = "";
            document.getElementById('formTitle').innerText = "إضافة منتج جديد";
            document.getElementById('submitBtn').innerText = "إضافة للموقع";
        }

        // دالة حساب الوقت (50 mins ago)
        function timeAgo(timestamp) {
            var seconds = Math.floor((Date.now() - timestamp) / 1000);
            var interval = Math.floor(seconds / 60);
            if(interval < 1) return "منذ ثواني";
            if(interval < 60) return "منذ " + interval + " دقيقة";
            var hours = Math.floor(interval / 60);
            if(hours < 24) return "منذ " + hours + " ساعة";
            var days = Math.floor(hours / 24);
            return "منذ " + days + " يوم";
        }

        // عرض الأوردرات بالوقت
        function renderOrders() {
            var orders = JSON.parse(localStorage.getItem('site_orders')) || [];
            var container = document.getElementById('ordersList');
            if(orders.length == 0) {
                container.innerHTML = '<p style="text-align:center;color:#888;padding:20px;">لا توجد طلبات جديدة حتى الآن.</p>';
                return;
            }

            var h = '';
            for(var i = orders.length - 1; i >= 0; i--) {
                var o = orders[i];
                var payTxt = o.payMethod === "Cash" ? "💵 كاش عند الاستلام" : "📱 انستاباي";
                
                var itemsHtml = '<div class="order-items-list">';
                for(var j=0; j<o.cart.length; j++) {
                    itemsHtml += '<div class="order-item-mini"><img src="'+o.cart[j].img+'"><div style="font-size:12px;">'+o.cart[j].name+'</div></div>';
                }
                itemsHtml += '</div>';

                h += '<div class="order-card">' +
                    '<div class="order-header">' +
                        '<div><span style="font-weight:800;">طلب #' + (i+1) + '</div><div class="order-time">' + (o.timestamp ? timeAgo(o.timestamp) : 'بدون وقت') + '</div></div>' +
                        '<div style="display:flex;gap:10px;align-items:center;">' +
                            '<span class="order-pay">' + payTxt + '</span>' +
                            '<span class="order-total">' + o.total + '</span>' +
                        '</div>' +
                    '</div>' +
                    itemsHtml +
                    '<div class="order-client-info">' +
                        '<strong>العميل:</strong> ' + o.name + '<br>' +
                        '<strong>الهاتف:</strong> ' + o.phone + '<br>' +
                        '<strong>العنوان:</strong> ' + o.address + 
                    '</div>' +
                '</div>';
            }
            container.innerHTML = h;
        }

        // التنبيه بالصوت لما يجي أوردر جديد وأنت مفتح الأدمن
        var lastOrderCount = parseInt(localStorage.getItem('lastOrderCount') || 0);
        var beepAudio = new Audio("data:audio/wav;base64,UklGRigAAABXQVZFZm10IEAAABDgAAAAAAAK8DwAAAEAAAASVWJTEAAAYYAAC9AYgAaABkAAAEAAAASUVORK5CYII=");
        beepAudio.volume = 0.5;

        setInterval(function() {
            var orders = JSON.parse(localStorage.getItem('site_orders')) || [];
            var currentCount = orders.length;
            if(currentCount > lastOrderCount) {
                lastOrderCount = currentCount;
                localStorage.setItem('lastOrderCount', lastOrderCount);
                renderOrders();
                beepAudio.play(); // إعطال صوت بيب
            }
        }, 3000); 

        renderProducts();
        renderOrders();
    </script>
</body>
</html>
